project:
  name: minicnn
  run_name: dual-cnn
  artifacts_root: artifacts

engine:
  backend: torch  # switch to cuda_legacy to use handcrafted CUDA path
  strict_backend_validation: true

runtime:
  cuda_variant: cublas  # cublas | handmade | default; used only by cuda_legacy
  cuda_so: null         # optional explicit .so path, overrides cuda_variant

dataset:
  type: cifar10
  data_root: data/cifar-10-batches-py
  download: false
  num_samples: 45000
  val_samples: 5000
  num_classes: 10
  input_shape: [3, 32, 32]
  seed: 42

model:
  layers:
    - type: Conv2d
      out_channels: 32
      kernel_size: 3
      stride: 1
      padding: 0
    - type: LeakyReLU
      negative_slope: 0.1
    - type: Conv2d
      out_channels: 32
      kernel_size: 3
      stride: 1
      padding: 0
    - type: LeakyReLU
      negative_slope: 0.1
    - type: MaxPool2d
      kernel_size: 2
      stride: 2
    - type: Conv2d
      out_channels: 64
      kernel_size: 3
      stride: 1
      padding: 0
    - type: LeakyReLU
      negative_slope: 0.1
    - type: Conv2d
      out_channels: 64
      kernel_size: 3
      stride: 1
      padding: 0
    - type: LeakyReLU
      negative_slope: 0.1
    - type: MaxPool2d
      kernel_size: 2
      stride: 2
    - type: Flatten
    - type: Linear
      out_features: 10

train:
  epochs: 5
  batch_size: 64
  device: auto
  amp: false
  grad_accum_steps: 1
  num_workers: 0
  log_every: 10

loss:
  type: CrossEntropyLoss

optimizer:
  type: SGD
  lr: 0.005
  lr_conv1: 0.005
  lr_conv: 0.005
  lr_fc: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  grad_clip_global: 0.0  # cuda_legacy only; 0 disables global norm clipping

scheduler:
  enabled: true
  type: ReduceLROnPlateau
  factor: 0.5
  patience: 3
