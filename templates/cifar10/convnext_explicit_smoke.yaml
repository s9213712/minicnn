# ConvNeXt explicit smoke config  (torch/flex, hermetic)
#
# Purpose:
# - Minimal integration smoke path for explicit ConvNeXt primitives.
# - Uses a synthetic random dataset so it works without downloads or prepared
#   CIFAR-10 files.
# - Keeps the same explicit primitive stack shape as convnext_explicit.yaml but shrinks
#   channel widths, dataset, and epoch count for quick validation.
# - Like convnext_explicit.yaml, this path is a sequential primitive stack and
#   does not encode residual add or layer scale semantics.
#
# Run:
#   minicnn train-flex --config templates/cifar10/convnext_explicit_smoke.yaml

project:
  name: minicnn
  run_name: cifar10-convnext-explicit-smoke
  artifacts_root: artifacts

engine:
  backend: torch
  strict_backend_validation: true

dataset:
  type: random
  num_samples: 64
  val_samples: 16
  num_classes: 10
  input_shape: [3, 32, 32]
  seed: 42

model:
  layers:
    - type: Conv2d
      out_channels: 8
      kernel_size: 3
      stride: 1
      padding: 1
    - type: DepthwiseConv2d
      kernel_size: 7
    - type: LayerNorm2d
    - type: PointwiseConv2d
      out_channels: 16
    - type: GELU
    - type: PointwiseConv2d
      out_channels: 8
    - type: DepthwiseConv2d
      kernel_size: 7
    - type: LayerNorm2d
    - type: PointwiseConv2d
      out_channels: 16
    - type: GELU
    - type: PointwiseConv2d
      out_channels: 8
    - type: Conv2d
      out_channels: 16
      kernel_size: 2
      stride: 2
    - type: DepthwiseConv2d
      kernel_size: 7
    - type: LayerNorm2d
    - type: PointwiseConv2d
      out_channels: 32
    - type: GELU
    - type: PointwiseConv2d
      out_channels: 16
    - type: DepthwiseConv2d
      kernel_size: 7
    - type: LayerNorm2d
    - type: PointwiseConv2d
      out_channels: 32
    - type: GELU
    - type: PointwiseConv2d
      out_channels: 16
    - type: GlobalAvgPool2d
    - type: Flatten
    - type: Linear
      out_features: 10

train:
  epochs: 1
  batch_size: 16
  device: cpu
  amp: false
  grad_accum_steps: 1
  num_workers: 0
  log_every: 10

loss:
  type: CrossEntropyLoss

optimizer:
  type: AdamW
  lr: 0.001
  weight_decay: 0.05

scheduler:
  enabled: true
  type: CosineAnnealingLR
  T_max: 1
