# ConvNeXt explicit cuda_native smoke config  (experimental, hermetic)
#
# Purpose:
# - Minimal cuda_native validation/training path for explicit ConvNeXt primitives.
# - Uses a synthetic random dataset so it works without downloads or prepared
#   CIFAR-10 files.
# - Stays within current cuda_native support boundaries:
#   SGD, CrossEntropyLoss, random dataset, no AMP, no grad accumulation.
#
# Run:
#   minicnn train-flex --config templates/cifar10/convnext_explicit_cuda_native_smoke.yaml

project:
  name: minicnn
  run_name: cifar10-convnext-explicit-cuda-native-smoke
  artifacts_root: artifacts

engine:
  backend: cuda_native
  strict_backend_validation: true

dataset:
  type: random
  num_samples: 64
  val_samples: 16
  num_classes: 10
  input_shape: [3, 32, 32]
  seed: 42

model:
  layers:
    - type: Conv2d
      out_channels: 32
      kernel_size: 3
      stride: 1
      padding: 1
    - type: DepthwiseConv2d
      kernel_size: 7
    - type: LayerNorm2d
    - type: PointwiseConv2d
      out_channels: 128
    - type: GELU
    - type: PointwiseConv2d
      out_channels: 32
    - type: Conv2d
      out_channels: 64
      kernel_size: 2
      stride: 2
    - type: DepthwiseConv2d
      kernel_size: 7
    - type: LayerNorm2d
    - type: PointwiseConv2d
      out_channels: 256
    - type: GELU
    - type: PointwiseConv2d
      out_channels: 64
    - type: GlobalAvgPool2d
    - type: Flatten
    - type: Linear
      out_features: 10

train:
  epochs: 1
  batch_size: 16
  device: cpu
  amp: false
  grad_accum_steps: 1
  num_workers: 0
  log_every: 10

loss:
  type: CrossEntropyLoss

optimizer:
  type: SGD
  lr: 0.01
  momentum: 0.9

scheduler:
  enabled: false
