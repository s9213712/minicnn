# CIFAR-10  ConvNeXt-like explicit primitives  (Torch-first, experimental)
#
# Architecture:
#   Stem Conv64
#   -> explicit sequential depthwise/LayerNorm2d/pointwise/GELU/pointwise stack x2
#   -> Downsample Conv128/stride=2
#   -> explicit sequential depthwise/LayerNorm2d/pointwise/GELU/pointwise stack x2
#   -> GAP -> FC10
#
# Scope:
# - Uses MiniCNN's explicit ConvNeXt primitives.
# - LayerNorm is channel-first LayerNorm2d on NCHW tensors.
# - This explicit primitive path does NOT include residual add or layer scale.
# - Use ConvNeXtBlock / convnext_like.yaml when you want residual ConvNeXt semantics.
# - This is an experimental frontend path, not repo-wide ConvNeXt support.
# - This full CIFAR + AdamW template is for torch/flex.
# - For the experimental cuda_native primitive path, use
#   templates/cifar10/convnext_explicit_cuda_native_smoke.yaml.
#
# Run:
#   minicnn train-flex --config templates/cifar10/convnext_explicit.yaml

project:
  name: minicnn
  run_name: cifar10-convnext-explicit
  artifacts_root: artifacts

engine:
  backend: torch
  strict_backend_validation: true

dataset:
  type: cifar10
  data_root: data/cifar-10-batches-py
  download: false
  num_samples: 45000
  val_samples: 5000
  num_classes: 10
  input_shape: [3, 32, 32]
  seed: 42
  random_crop_padding: 4
  horizontal_flip: true

model:
  layers:
    - type: Conv2d
      out_channels: 64
      kernel_size: 3
      stride: 1
      padding: 1

    - type: DepthwiseConv2d
      kernel_size: 7
    - type: LayerNorm2d
    - type: PointwiseConv2d
      out_channels: 256
    - type: GELU
    - type: PointwiseConv2d
      out_channels: 64

    - type: DepthwiseConv2d
      kernel_size: 7
    - type: LayerNorm2d
    - type: PointwiseConv2d
      out_channels: 256
    - type: GELU
    - type: PointwiseConv2d
      out_channels: 64

    - type: Conv2d
      out_channels: 128
      kernel_size: 2
      stride: 2

    - type: DepthwiseConv2d
      kernel_size: 7
    - type: LayerNorm2d
    - type: PointwiseConv2d
      out_channels: 512
    - type: GELU
    - type: PointwiseConv2d
      out_channels: 128

    - type: DepthwiseConv2d
      kernel_size: 7
    - type: LayerNorm2d
    - type: PointwiseConv2d
      out_channels: 512
    - type: GELU
    - type: PointwiseConv2d
      out_channels: 128

    - type: GlobalAvgPool2d
    - type: Flatten
    - type: Linear
      out_features: 10

train:
  epochs: 50
  batch_size: 64
  device: auto
  amp: false
  grad_accum_steps: 1
  num_workers: 0
  log_every: 50

loss:
  type: CrossEntropyLoss

optimizer:
  type: AdamW
  lr: 0.001
  weight_decay: 0.05

scheduler:
  enabled: true
  type: CosineAnnealingLR
  T_max: 50
