# CIFAR-10  AlexNet-like  (Torch backend only)
#
# Architecture: Conv64‚ÜíPool‚ÜíConv128‚ÜíPool‚ÜíConv256‚ÜíConv256‚ÜíPool‚ÜíFC512‚ÜíFC10
# Input: 3√ó32√ó32  |  Classes: 10
# Requires torch backend; not compatible with cuda_legacy subset.
#
# Run:
#   minicnn train-flex --config templates/cifar10/alexnet_like.yaml

project:
  name: minicnn
  run_name: cifar10-alexnet-like
  artifacts_root: artifacts

engine:
  backend: torch
  strict_backend_validation: true

dataset:
  type: cifar10
  data_root: data/cifar-10-batches-py
  download: false
  num_samples: 45000
  val_samples: 5000
  num_classes: 10
  input_shape: [3, 32, 32]
  seed: 42
  random_crop_padding: 4
  horizontal_flip: true

model:
  layers:
    # Block 1 ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    - type: Conv2d
      out_channels: 64
      kernel_size: 3
      stride: 1
      padding: 1
    - type: ReLU
    - type: MaxPool2d
      kernel_size: 2
      stride: 2
    # Block 2 ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    - type: Conv2d
      out_channels: 128
      kernel_size: 3
      padding: 1
    - type: ReLU
    - type: MaxPool2d
      kernel_size: 2
      stride: 2
    # Block 3 ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    - type: Conv2d
      out_channels: 256
      kernel_size: 3
      padding: 1
    - type: ReLU
    - type: Conv2d
      out_channels: 256
      kernel_size: 3
      padding: 1
    - type: ReLU
    - type: MaxPool2d
      kernel_size: 2
      stride: 2
    # Classifier ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    - type: Flatten
    - type: Linear
      out_features: 512
    - type: ReLU
    - type: Dropout
      p: 0.5
    - type: Linear
      out_features: 10

train:
  epochs: 30
  batch_size: 64
  device: auto
  amp: false
  grad_accum_steps: 1
  num_workers: 0
  log_every: 50

loss:
  type: CrossEntropyLoss

optimizer:
  type: SGD
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005

scheduler:
  enabled: true
  type: CosineAnnealingLR
  T_max: 30
