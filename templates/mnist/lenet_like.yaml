# MNIST  LeNet-like CNN  (Torch backend)
#
# Architecture: Conv(1в†’8)в†’Poolв†’Conv(8в†’16)в†’Poolв†’FC(400в†’10)
# Input: 1Г—28Г—28  |  Classes: 10
#
# First run вЂ” download dataset automatically:
#   minicnn train-flex --config templates/mnist/lenet_like.yaml
#   (dataset.download: true is set below; flip to false after first run)
#
# Shape trace:
#   1Г—28Г—28 в†’ Conv(8,3Г—3) в†’ 8Г—26Г—26 в†’ Pool(2) в†’ 8Г—13Г—13
#           в†’ Conv(16,3Г—3) в†’ 16Г—11Г—11 в†’ Pool(2) в†’ 16Г—5Г—5
#           в†’ Flatten в†’ 400 в†’ Linear(10)
#
# Best checkpoints are written to artifacts/models/.
# See templates/README.md for the trainer file map.

project:
  name: minicnn
  run_name: mnist-lenet-like
  artifacts_root: artifacts

engine:
  backend: torch
  strict_backend_validation: false

dataset:
  type: mnist
  data_root: data/mnist
  download: true           # downloads ~11 MB on first run; set false afterwards
  num_samples: 55000
  val_samples: 5000
  num_classes: 10
  input_shape: [1, 28, 28]
  seed: 42

model:
  layers:
    # Block 1 в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - type: Conv2d
      out_channels: 8
      kernel_size: 3
      stride: 1
      padding: 0
    - type: ReLU
    - type: MaxPool2d
      kernel_size: 2
      stride: 2
    # Block 2 в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - type: Conv2d
      out_channels: 16
      kernel_size: 3
      stride: 1
      padding: 0
    - type: ReLU
    - type: MaxPool2d
      kernel_size: 2
      stride: 2
    # Classifier в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - type: Flatten
    - type: Linear
      out_features: 10

train:
  epochs: 15
  batch_size: 64
  device: auto
  amp: false
  grad_accum_steps: 1
  num_workers: 0
  log_every: 100

loss:
  type: CrossEntropyLoss

optimizer:
  type: SGD
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001

scheduler:
  enabled: true
  type: StepLR
  step_size: 5
  gamma: 0.5
